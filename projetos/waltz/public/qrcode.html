<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectar WhatsApp - Waltz</title>
    <link rel="stylesheet" href="./style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f1f5f9; font-family: sans-serif; }
        .qr-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; }
        .qr-image-container { width: 250px; height: 250px; margin: 20px auto; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
        #qrcode-img { max-width: 100%; max-height: 100%; display: none; }
        .btn-gerar { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; }
        .btn-gerar:hover { background: #059669; }
        #status-msg { margin-top: 15px; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>

    <div class="qr-card">
        <h2>Conexão do WhatsApp</h2>
        <p style="color: #475569; font-size: 14px;">Gere o código abaixo e leia com o WhatsApp da sua loja (Dispositivos Conectados).</p>
        
        <div class="qr-image-container">
            <span id="loading-spinner">Aguardando...</span>
            <img id="qrcode-img" src="" alt="QR Code WhatsApp">
        </div>

        <button id="btn-gerar" class="btn-gerar">Gerar Novo QR Code</button>
        <div id="status-msg"></div>
    </div>

    <!-- Importamos o nosso script que fará a mágica acontecer -->
    <script src="./conectar_whatsapp.js"></script>
</body>
</html>
