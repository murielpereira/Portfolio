<div class="dashboard-container">
    <header class="topbar">
        <h1>Painel de Automações Waltz</h1>
        <button id="btn-logout" class="btn-sair">Sair (Logout)</button>
    </header>

    <section class="card">
        <h2>📊 Base de Clientes (LTV)</h2>
        <div class="card-actions">
            <button onclick="sincronizarTiny()" class="btn-azul">🔄 Sincronizar Tudo (Tiny)</button>
            <button onclick="carregarRelatorioClientes()" class="btn-secundario">Recarregar Tabela</button>
        </div>
        
        <div class="tabela-responsiva">
            <table class="tabela-dados">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>CPF/CNPJ</th>
                        <th>Cidade</th>
                        <th>UF</th>
                        <th>Pedidos</th>
                        <th>Valor Total</th>
                    </tr>
                </thead>
                <tbody id="tabela-clientes-body">
                    <tr><td colspan="6">Carregando dados do banco...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <section class="card">
        <h2>🛒 Teste de Conexão: Nuvemshop</h2>
        <div class="card-actions">
            <button id="btn-buscar-pedidos" class="btn-primario">Buscar Pedidos Nuvemshop</button>
        </div>
        
        <div class="tabela-responsiva">
            <table id="tabela-pedidos-nuvem" class="tabela-dados" style="display: none;">
                <thead>
                    <tr>
                        <th>Nº do Pedido</th>
                        <th>Cliente</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela-nuvem">
                </tbody>
            </table>
        </div>
    </section>
</div>
