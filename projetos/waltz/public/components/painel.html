<div class="dashboard-wrapper">
    <aside class="sidebar">
        <div class="brand">Waltz Âme</div>
        <ul class="nav-links">
            <li>
                <div class="nav-link active">
                    <span class="material-symbols-outlined">analytics</span>
                    Base de Clientes (LTV)
                </div>
            </li>
            </ul>
        <div class="user-menu" style="margin-top: 20px; border-top: 1px solid #2d3748; padding-top: 20px;">
            <button id="btn-logout" class="btn-sair" style="width: 100%;">Sair</button>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h1>Relatório de Lifetime Value (LTV)</h1>
        </header>

        <div class="page-content">
            <section class="card">
                <div class="card-header-actions">
                    <div class="filtros-ltv">
                        <label for="filtro-grupo">Filtrar por Grupo:</label>
                        <select id="filtro-grupo" onchange="resetarEPaginacao()">
                            <option value="TODOS">Todos os Grupos</option>
                            <option value="PRIMEIRA COMPRA">1ª Compra</option>
                            <option value="BRONZE">Bronze</option>
                            <option value="PRATA">Prata</option>
                            <option value="OURO">Ouro</option>
                            <option value="DIAMANTE">Diamante</option>
                        </select>
                    </div>
                    <button onclick="sincronizarTiny()" class="btn-azul">🔄 Atualizar Dados com Tiny</button>
                </div>
                
                <div class="tabela-responsiva">
                    <table class="tabela-dados" id="tabela-ltv">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>WhatsApp</th>
                                <th>CPF/CNPJ</th>
                                <th>Cidade</th>
                                <th>UF</th>
                                <th>Selo</th>
                                <th class="col-sort" onclick="ordenarTabela(6)">Pedidos ↕️</th>
                                <th class="col-sort" onclick="ordenarTabela(7)">Valor Total ↕️</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-clientes-body">
                            <tr><td colspan="8">Buscando banco de dados... Aguarde.</td></tr>
                        </tbody>
                    </table>
                </div>

                <div class="paginacao-controles">
                    <button id="btn-prev-ltv" onclick="mudarPaginaRelatorio(-1)" class="btn-paginacao">Anterior</button>
                    <span id="info-paginacao-ltv">Página 1</span>
                    <button id="btn-next-ltv" onclick="mudarPaginaRelatorio(1)" class="btn-paginacao">Próximo</button>
                </div>
            </section>
        </div>
    </main>
</div>
