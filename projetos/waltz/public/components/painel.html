<div class="painel-container" style="max-width: 800px; margin: auto;">
    <h1>Painel de Automações</h1>
    <p>Conectado ao sistema central.</p>

    <div style="margin: 20px 0;">
        <button id="btn-buscar-pedidos" class="btn-primario" style="background-color: #4b2c71; color: white;">
            Buscar Pedidos Nuvemshop
        </button>
    </div>

    <div class="tabela-container">
        <table id="tabela-pedidos" style="display: none; width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
                <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 12px; text-align: left;">Nº do Pedido</th>
                    <th style="padding: 12px; text-align: left;">Cliente</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </div>

    <button id="btn-logout" class="btn-sair">Sair (Logout)</button>
</div>
