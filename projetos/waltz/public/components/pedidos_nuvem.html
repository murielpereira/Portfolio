<section class="card">
    <!-- Cabeçalho com Filtros (Mesmo padrão do Tiny) -->
    <div class="card-header-actions" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center;">
        
        <div class="filtros-area" style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
            <!-- Busca por Texto -->
            <div style="display: flex; align-items: center; gap: 8px;">
                <label for="busca-nuvem" style="margin: 0; font-weight: bold; color: #475569;">Buscar:</label>
                <input type="text" id="busca-nuvem" class="input-padrao" placeholder="Pedido, Cliente ou CPF..." onkeyup="resetarPaginacaoNuvem()" style="width: 200px; padding: 8px;">
            </div>
            
            <!-- Filtro de Status do Pedido -->
            <div style="display: flex; align-items: center; gap: 8px;">
                <label for="filtro-status-nuvem" style="margin: 0; font-weight: bold; color: #475569;">Status:</label>
                <select id="filtro-status-nuvem" class="input-padrao" onchange="resetarPaginacaoNuvem()" style="padding: 8px; cursor: pointer;">
                    <option value="TODOS">Todos</option>
                    <option value="Aberto">Aberto</option>
                    <option value="Arquivado">Arquivado</option>
                    <option value="Cancelado">Cancelado</option>
                </select>
            </div>

            <!-- Filtro de Feedback WPP -->
            <div style="display: flex; align-items: center; gap: 8px;">
                <label for="filtro-feedback-nuvem" style="margin: 0; font-weight: bold; color: #475569;">Feedback:</label>
                <select id="filtro-feedback-nuvem" class="input-padrao" onchange="resetarPaginacaoNuvem()" style="padding: 8px; cursor: pointer;">
                    <option value="TODOS">Todos</option>
                    <option value="Enviado">Enviado</option>
                    <option value="Não Enviado">Não Enviado</option>
                </select>
            </div>
            
            <!-- Contador de Pedidos -->
            <span id="contador-nuvem" style="background: #e2e8f0; color: #334155; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: bold;">
                0 pedidos
            </span>
        </div>
        
    </div>
    
    <div class="tabela-responsiva">
        <table class="tabela-dados">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Pedido</th>
                    <th>Cliente</th>
                    <th>CPF</th>
                    <th>Cidade</th>
                    <th>UF</th>
                    <th>Transportadora</th>
                    <th>Rastreio</th>
                    <th>Status</th>
                    <th style="text-align:center;">Feedback</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela-nuvem">
                <tr><td colspan="10" style="text-align: center; padding: 30px;">Clique em "Buscar Pedidos Nuvem" para iniciar.</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Container da Paginação -->
    <div class="paginacao-controles" id="paginacao-nuvem"></div>
</section>
